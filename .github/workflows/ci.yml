name: Verify HTML MVP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # daily sanity check

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          test -f index.html
          wc -l index.html
          grep -c '<script>' index.html
          grep -c '</script>' index.html

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Smoke test (load HTML, check key elements)
        run: |
          # Start a static server in background
          nohup python3 -m http.server 8765 > /tmp/http.log 2>&1 &
          sleep 2
          # Headless Chrome dump DOM
          timeout 30 google-chrome \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --disable-dev-shm-usage \
            --virtual-time-budget=3000 \
            --dump-dom http://localhost:8765/index.html > /tmp/dom.html 2>/tmp/chrome.log
          EXIT=$?
          pkill -f "http.server 8765" 2>/dev/null
          echo "Chrome exit: $EXIT"
          echo "--- DOM head ---"
          head -c 500 /tmp/dom.html
          echo ""
          echo "--- Checks ---"
          FAIL=0
          for sym in 'Hungry Whale' 'id="game"' 'id="startBtn"' '🐋' '🐟' '🚢' '🪼' '🦈'; do
            if grep -q "$sym" /tmp/dom.html; then
              echo "PASS: contains '$sym'"
            else
              echo "FAIL: missing '$sym'"
              FAIL=1
            fi
          done
          exit $FAIL
